name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild, for example v0.1.1
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows-x64
            runner: windows-latest
          - name: linux-x64
            runner: ubuntu-22.04
          - name: macos-x64
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15

    env:
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          path: release-tools

      - name: Ensure tag is on main
        shell: bash
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like vX.Y.Z."
            exit 1
          fi
          git fetch origin main
          release_sha=$(git rev-list -n 1 "${RELEASE_TAG}")
          if ! git merge-base --is-ancestor "${release_sha}" origin/main; then
            echo "Release tags must point to commits on main."
            exit 1
          fi

      - name: Install Linux dependencies
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Sync release version from tag
        shell: bash
        run: npm run version:sync -- "${RELEASE_TAG#v}"

      - name: Install frontend dependencies
        run: npm ci


      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Generate default Tauri channel config
        shell: bash
        run: |
          node release-tools/scripts/channel-config.mjs default src-tauri/target/channel/tauri.default.conf.json
          test -f src-tauri/target/channel/tauri.default.conf.json

      - name: Ensure Tauri action npm script
        run: npm pkg set scripts.tauri=tauri

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOLD_BAND_RELEASE_CHANNEL: default
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.DEFAULT_TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.DEFAULT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --config src-tauri/target/channel/tauri.default.conf.json
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Gold Band ${{ env.RELEASE_TAG }}
          releaseDraft: true
          prerelease: false

  updater-json:
    name: Generate updater manifest
    runs-on: ubuntu-22.04
    needs: build

    env:
      RELEASE_TAG: ${{ inputs.tag }}

    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${RELEASE_TAG}" --dir release-assets --clobber

      - name: Generate latest.json
        run: node scripts/generate-updater-json.mjs release-assets latest.json

      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${RELEASE_TAG}" latest.json --clobber
