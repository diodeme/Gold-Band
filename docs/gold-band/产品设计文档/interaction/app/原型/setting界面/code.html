<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#1b1c1c",
                        "background": "#031427",

                        "inverse-primary": "#855300",
                        "surface-container-lowest": "#000f21",
                        "surface-tint": "#ffb95f",
                        "primary-container": "#f59e0b",
                        "on-primary-fixed": "#2a1700",
                        "on-error": "#690005",
                        "secondary": "#c8c6c5",
                        "primary-fixed": "#ffddb8",
                        "tertiary": "#cecccc",
                        "surface-container-high": "#1b2b3f",

                        "on-primary": "#472a00",
                        "on-surface": "#d3e4fe",

                        "surface": "#031427",
                        "error-container": "#93000a",

                        "on-surface-variant": "#d8c3ad",
                        "secondary-container": "#474746",
                        "on-tertiary-container": "#444444",
                        "outline-variant": "#534434",
                        "surface-container-low": "#0b1c30",
                        "on-primary-container": "#613b00",
                        "surface-variant": "#26364a",
                        "surface-container": "#102034",
                        "primary": "#ffc174",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#26364a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "display": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #031427;
            color: #d3e4fe;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #26364a;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased overflow-hidden">
<!-- SideNavBar (Rail) -->
<aside class="fixed left-0 top-0 h-full w-16 border-r border-neutral-900 bg-neutral-950 flex flex-col items-center py-6 gap-8 z-50">
<div class="text-amber-500 font-bold tracking-tighter mb-4">
<span class="material-symbols-outlined text-3xl" data-icon="token">token</span>
</div>
<nav class="flex flex-col items-center gap-6 flex-1">
<div class="text-neutral-500 grayscale opacity-50 p-2 cursor-not-allowed group relative" title="任务编排">
<span class="material-symbols-outlined" data-icon="account_tree">account_tree</span>
</div>
<div class="text-neutral-500 grayscale opacity-50 p-2 cursor-not-allowed" title="知识库">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
</div>
<div class="text-neutral-500 grayscale opacity-50 p-2 cursor-not-allowed" title="模型管理">
<span class="material-symbols-outlined" data-icon="memory">memory</span>
</div>
</nav>
<div class="mt-auto flex flex-col items-center gap-6">
<div class="text-amber-500 bg-neutral-900/50 rounded-lg p-2 transition-all duration-200 cursor-pointer" title="设置">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant">
<img alt="Avatar" data-alt="A professional high-contrast profile avatar for a tech professional. The image features a minimalist geometric design with a dark sapphire blue and amber gold color scheme, consistent with a high-end engineering software's aesthetic. The lighting is crisp and modern, emphasizing precision and clarity in a digital workspace environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmtc2WMh4Bw-D50g4NU94MA1h2f7TIu94cyEBtzStb8jvl7bZeG9oWe8-agJNXzCcpZbZ2VVfGUkZKlNUR-HbCzo8dVJDZmTF3kAOnYwWwwwckX5DN0lCzlxxTTvOrc_jKRV5IqOmKwvBcdganD21rcRWFZhGuJq60g0xgT11Lo3Sof3sUF1MRlVmgJdldQouZ1NG5576baEjds8wLsXZsEIAc1F4VAeTpkT7LFFicDnvLV2YqCndh8tYMO3cygSbleSCTpX3Vuw"/>
</div>
</div>
</aside>
<!-- TopAppBar -->
<header class="fixed top-0 left-16 right-0 h-14 border-b border-neutral-900 bg-neutral-950/80 backdrop-blur-sm flex items-center justify-between px-6 z-40">
<div class="flex items-center gap-4">
<div class="flex items-center text-xs text-neutral-500 font-['Space_Grotesk']">
<span>Gold Band</span>
<span class="material-symbols-outlined text-sm mx-1" data-icon="chevron_right">chevron_right</span>
<span class="text-neutral-300">设置</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<button class="px-3 py-1 text-xs font-medium text-neutral-400 hover:text-neutral-100 hover:bg-neutral-800 rounded-md transition-colors">导出</button>
<button class="px-3 py-1 text-xs font-medium bg-amber-500 text-neutral-950 hover:bg-amber-400 rounded-md transition-colors">运行</button>
</div>
<div class="h-4 w-[1px] bg-neutral-800 mx-2"></div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-neutral-400 cursor-pointer hover:text-neutral-100 transition-colors" data-icon="history">history</span>
<span class="material-symbols-outlined text-neutral-400 cursor-pointer hover:text-neutral-100 transition-colors" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-neutral-400 cursor-pointer hover:text-neutral-100 transition-colors" data-icon="help_outline">help_outline</span>
</div>
</div>
</header>
<!-- Content Area -->
<main class="ml-16 mt-14 h-[calc(100vh-3.5rem)] overflow-y-auto custom-scrollbar bg-surface text-on-surface">
<div class="max-w-4xl mx-auto px-12 py-10">
<!-- Header Section -->
<header class="mb-10">
<h1 class="text-3xl font-headline font-bold text-neutral-100 tracking-tight mb-2">设置</h1>
</header>
<div class="grid gap-6">
<!-- Appearance Section -->
<section class="bg-surface-container border border-neutral-900 rounded-xl p-8">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-neutral-400" data-icon="palette">palette</span>
<h2 class="text-lg font-headline font-semibold text-neutral-100">外观</h2>
</div>
<div class="flex items-center justify-between">
<div>
<p class="text-sm font-medium text-neutral-200">主题</p>
</div>
<div class="flex bg-neutral-950 p-1 rounded-lg border border-neutral-800">
<button class="px-4 py-1.5 text-xs font-medium text-neutral-500 hover:text-neutral-300 transition-colors">Light</button>
<button class="px-4 py-1.5 text-xs font-medium text-amber-500 bg-neutral-800 rounded-md shadow-sm">Dark</button>
<button class="px-4 py-1.5 text-xs font-medium text-neutral-500 hover:text-neutral-300 transition-colors">System</button>
</div>
</div>
</section>
<!-- Language Section -->
<section class="bg-surface-container border border-neutral-900 rounded-xl p-8">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-neutral-400" data-icon="translate">translate</span>
<h2 class="text-lg font-headline font-semibold text-neutral-100">语言</h2>
</div>
<div class="flex items-center justify-between">
<div>
<p class="text-sm font-medium text-neutral-200">语言选择</p>
</div>
<div class="relative w-48">
<select class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-2 text-xs font-medium text-neutral-200 appearance-none focus:outline-none focus:border-amber-500 transition-colors">
<option selected="">中文</option>
<option>English</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-neutral-500 pointer-events-none text-sm" data-icon="unfold_more">unfold_more</span>
</div>
</div>
</section>
<!-- Advanced/Hidden Placeholder (Visual balance) -->
<section class="mt-8 border-t border-neutral-900 pt-8 opacity-40 select-none grayscale">
<div class="flex items-center justify-between px-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="database">database</span>
<span class="text-sm font-medium">本地存储管理</span>
</div>
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
</section>
</div>
<!-- Footer Details -->
<footer class="mt-16 text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full border border-outline-variant/20">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
<span class="text-[10px] font-mono text-neutral-500 uppercase tracking-widest">Client Version: 2.4.1-Stable</span>
</div>
</footer>
</div>
</main>
<!-- Overlay Visual Enhancement: Soft Glow -->
<div class="fixed top-0 right-0 w-1/3 h-1/3 bg-primary/5 blur-[120px] pointer-events-none -z-10"></div>
<div class="fixed bottom-0 left-0 w-1/4 h-1/4 bg-blue-500/5 blur-[100px] pointer-events-none -z-10"></div>
</body></html>
